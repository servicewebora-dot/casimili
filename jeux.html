<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu Tower</title>
<style>
    body {
        background: #0f172a;
        color: white;
        font-family: Arial;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
    }

    .tower {
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        margin-top: 30px;
    }

    .level {
        width: 200px;
        height: 40px;
        margin: 5px;
        background: #1e293b;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.3s;
    }

    .level:hover {
        background: #334155;
    }

    .active {
        background: #22c55e;
    }

    .danger {
        background: #ef4444;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        background: #facc15;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>🎰 Jeu Tower</h1>
<p>Clique sur le niveau pour monter… mais attention à la case piège 💣</p>

<div class="tower" id="tower"></div>

<h2 id="score">Score : 0</h2>

<button onclick="resetGame()">Rejouer</button>

<script>
let currentLevel = 0;
let score = 0;
const maxLevels = 8;

const tower = document.getElementById("tower");
const scoreDisplay = document.getElementById("score");

function generateTower() {
    tower.innerHTML = "";
    for (let i = 0; i < maxLevels; i++) {
        const div = document.createElement("div");
        div.classList.add("level");
        div.innerText = "Niveau " + (i + 1);

        div.onclick = () => playLevel(div, i);
        tower.appendChild(div);
    }
}

function playLevel(element, level) {
    if (level !== currentLevel) return;

    const lose = Math.random() < 0.3; // 30% de perdre

    if (lose) {
        element.classList.add("danger");
        alert("💀 Perdu ! Score final : " + score);
        resetGame();
    } else {
        element.classList.add("active");
        score += 10;
        currentLevel++;
        scoreDisplay.innerText = "Score : " + score;

        if (currentLevel === maxLevels) {
            alert("🔥 Gagné ! Score max : " + score);
            resetGame();
        }
    }
}

function resetGame() {
    currentLevel = 0;
    score = 0;
    scoreDisplay.innerText = "Score : 0";
    generateTower();
}

generateTower();
</script>

</body>
</html>
